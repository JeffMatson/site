name: Update README Screenshots

on:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

permissions: {}

jobs:
    screenshots:
        if: github.actor == github.repository_owner
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
                  cache: 'pnpm'

            - run: pnpm install --frozen-lockfile

            - name: Install Chromium
              run: pnpm exec playwright install chromium

            - name: Capture screenshots
              run: pnpm exec playwright test test/e2e/screenshots.spec.ts

            - name: Commit updated screenshots
              run: |
                  git diff --quiet public/images/screenshots/ && exit 0
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add public/images/screenshots/
                  git commit -m "Update README screenshots"
                  git push
