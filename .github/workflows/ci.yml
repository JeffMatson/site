name: CI

on:
    pull_request:
        branches:
            - master
    workflow_call:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions: {}

jobs:
    check:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 22
                  cache: 'pnpm'

            - run: pnpm install --frozen-lockfile

            - run: pnpm lint
            - run: pnpm test:run

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 22
                  cache: 'pnpm'

            - run: pnpm install --frozen-lockfile

            - run: pnpm build
